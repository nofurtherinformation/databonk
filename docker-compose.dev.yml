version: '3.8'

services:
  app:
    extends:
      file: docker-compose.yml
      service: app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    ports:
      - "3000:3000"
      - "8080:8080"
      - "9229:9229" # Node.js debugger port
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - DEBUG=*
    command: >
      sh -c "npm install && npm run dev"

  test-watch:
    extends:
      file: docker-compose.yml
      service: test
    command: npm run test:watch
    stdin_open: true
    tty: true

  # Hot reload development server
  dev-server:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=development
    working_dir: /app
    command: >
      sh -c "
        npm install && 
        npx http-server examples -p 8081 --cors
      "

  # Database service for testing (optional)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: poboy_test
      POSTGRES_USER: poboy
      POSTGRES_PASSWORD: development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: